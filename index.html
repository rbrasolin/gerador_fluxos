<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gerador de Fluxograma</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <h1>Gerador de Fluxo</h1>

    <!-- CABEÇALHO -->
    <div class="header-form">

      <div class="form-group">
        <label>Desenho</label>
        <input type="text" id="desenho" placeholder="Ex: As Is / To Be">
      </div>

      <div class="form-group">
        <label>Nome do Processo</label>
        <input type="text" id="nomeProcesso">
      </div>

      <div class="form-group">
        <label>Analista</label>
        <input type="text" id="analista">
      </div>

      <div class="form-group">
        <label>Negócio</label>
        <input type="text" id="negocio">
      </div>

      <div class="form-group">
        <label>Gestor</label>
        <input type="text" id="gestor" placeholder="Ex.: Nome do gestor imediato">
      </div>

    </div>

    <input type="file" id="fileInput" />

    <div class="buttons">
      <button onclick="gerarFluxo()">Gerar Fluxo</button>
      <button onclick="baixarImagem()">Baixar Fluxo</button>
    </div>

    <div id="infoProcesso"></div>

    <div id="canvas"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
