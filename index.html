<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.0/dist/tailwind.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen py-8">
  <div class="container mx-auto px-4 max-w-7xl">
    
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-5xl font-black bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-4">
        🛠️ ComponenteFerramenta
      </h1>
      <p class="text-xl text-gray-600">Gerador de Fluxos BPMN com Análise Pareto</p>
    </div>
    
    <!-- Inputs -->
    <div class="grid md:grid-cols-3 gap-6 mb-8">
      <div>
        <label class="block text-sm font-bold mb-2">Processo</label>
        <input type="text" id="processo" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-200">
      </div>
      <div>
        <label class="block text-sm font-bold mb-2">Analista</label>
        <input type="text" id="analista" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-200">
      </div>
      <div class="md:col-span-3">
        <label class="block text-sm font-bold mb-2">Dados Excel</label>
        <textarea id="entrada" rows="8" 
                  class="w-full p-6 border-2 border-gray-200 rounded-xl resize-vertical font-mono text-sm focus:ring-4 focus:ring-blue-200"
                  placeholder="1	A	Receber?	Manual	Email	5	2	3	blue
2	B	Processar	Robô	SAP	10					"></textarea>
      </div>
    </div>
    
    <!-- Botões -->
    <div class="flex flex-wrap gap-4 justify-center mb-12">
      <button onclick="gerarFluxo()" 
              class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-12 py-4 rounded-2xl font-black text-lg shadow-2xl transform hover:-translate-y-1 transition-all">
        🎨 Gerar Fluxo BPMN
      </button>
      <button onclick="exportarPNG()" 
              class="bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white px-12 py-4 rounded-2xl font-black text-lg shadow-2xl transform hover:-translate-y-1 transition-all">
        💾 Exportar PNG
      </button>
      <button onclick="limparTudo()" 
              class="bg-gradient-to-r from-gray-500 to-gray-600 hover:from-gray-600 hover:to-gray-700 text-white px-12 py-4 rounded-2xl font-black text-lg shadow-2xl transform hover:-translate-y-1 transition-all">
        🗑️ Limpar Tudo
      </button>
    </div>
    
    <!-- Fluxo BPMN - ESPAÇO ENORME -->
    <div class="bg-white border-4 border-gray-200 rounded-3xl p-12 shadow-2xl mb-12" style="height: 700px; overflow: auto;">
      <div id="diagram" class="mermaid w-full h-full"></div>
    </div>
    
    <!-- Análises Pareto -->
    <div id="analises" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
      <!-- Preenche via JS -->
    </div>
    
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      mermaid.initialize({
        startOnLoad: false,
        flowchart: {
          curve: 'linear',
          nodeSpacing: 220,
          rankSpacing: 50
        }
      });
    });

    function limparTexto(txt) {
      return txt.replace(/"/g, '').replace(/\(/g, '').replace(/\)/g, '').replace(/:/g, '').trim();
    }

    function gerarFluxo() {
      let texto = document.getElementById("entrada").value;
      let linhas = texto.trim().split("\n");
      let mermaidCode = "flowchart LR\n";
      let nodes = {}, links = [], allIds = [];
      
      // 1. Coleta IDs únicos ordenados
      linhas.forEach(linha => {
        if (!linha.trim()) return;
        let col = linha.trim().split(/\s{2,}|\t/);
        if (col.length < 6) return;
        allIds.push("A" + Number(col[1]));
      });
      allIds = [...new Set(allIds)].sort((a,b)=>Number(a.slice(1))-Number(b.slice(1)));

      let tempoTotal = 0, loops = 0, manual = 0, sistemaAuto = 0, atividadesTempo = [];

      // 2. Processa nós e links
      linhas.forEach(linha => {
        if (!linha.trim()) return;
        let col = linha.trim().split(/\s{2,}|\t/);
        if (col.length < 6) return;
        
        let idNumero = Number(col[1]);
        let id = "A" + idNumero;
        let atividade = limparTexto(col[2]);
        let tipo = (col[3] || "").toLowerCase();
        let sistema = limparTexto(col[4] || "");
        let tempo = Number(col[5]) || 0;
        let proxSim = col[6] ? "A" + col[6] : null;
        let proxNao = col[7] ? "A" + col[7] : null;
        let cor = col[8] ? col[8].toLowerCase().trim() : "";
        
        tempoTotal += tempo;
        atividadesTempo.push({atividade, tempo});
        if (tipo === "manual") manual++;
        else sistemaAuto++;
        if (proxNao && Number(col[7]) < idNumero) loops++;
        
        let label = `${atividade}\\n${sistema}\\n${tempo}min`;
        
        let nodeDef;
        if (atividade.includes("?")) {
          nodeDef = `${id}{"${label}"}`;  // Losango
          if (proxSim) links.push(`${id} -->|Sim| ${proxSim}`);
          if (proxNao) links.push(`${id} -->|Não| ${proxNao}`);
        } else {
          nodeDef = `${id}["${label}"]`;  // Retangular
          if (proxSim) links.push(`${id} --> ${proxSim}`);
          if (proxNao) links.push(`${id} --> ${proxNao}`);
        }
        
        if (cor && cor !== "") nodeDef += `:::${cor}`;
        nodes[id] = nodeDef;
      });

      // 3. **CADEIA INVISÍVEL L→R** (resolve tudo!)
      for (let i = 0; i < allIds.length - 1; i++) {
        links.unshift(`${allIds[i]} -.-> ${allIds[i+1]}`);  // Ponta tracejada sutil
      }

      // 4. Monta código final
      allIds.forEach(id => mermaidCode += nodes[id] + "\n");
      links.forEach(l => mermaidCode += l + "\n");

      // 5. Estilos perfeitos
      mermaidCode += "\nclassDef default fill:#e3f2fd,stroke:#000,stroke-width:4px,color:#000\n";
      ['blue','yellow','green','red','white'].forEach(c => {
        if (Object.values(nodes).some(n=>n.includes(c)))
          mermaidCode += `classDef ${c} fill:#${c==='blue'?'8ecae6':c==='yellow'?'ffd166':c==='green'?'95d5b2':c==='red'?'ef476f':'ffffff'},stroke:#000,stroke-width:4px,color:#000\n`;
      });

      document.getElementById("diagram").innerHTML = mermaidCode;
      mermaid.init();
      mostrarAnalises(tempoTotal, loops, manual, sistemaAuto, atividadesTempo);
    }

    function mostrarAnalises(total, loops, manual, auto, atividades) {
      atividades.sort((a,b)=>b.tempo-a.tempo);
      let pareto = atividades.slice(0,Math.ceil(atividades.length*0.2)).reduce((s,a)=>s+a.tempo,0);
      
      document.getElementById("analises").innerHTML = `
        <div class="bg-white/80 backdrop-blur-sm p-8 rounded-3xl shadow-2xl border border-white/50">
          <h3 class="text-2xl font-black mb-6 text-gray-800">📊 Dashboard</h3>
          <div class="grid grid-cols-2 gap-6 text-center">
            <div class="p-6 bg-gradient-to-br from-blue-100 to-blue-200 rounded-2xl">
              <div class="text-4xl font-black text-blue-600">${total}</div>
              <div class="text-sm font-bold text-gray-700 mt-1">minutos totais</div>
            </div>
            <div class="p-6 bg-gradient-to-br from-red-100 to-red-200 rounded-2xl">
              <div class="text-4xl font-black text-red-600">${loops}</div>
              <div class="text-sm font-bold text-gray-700 mt-1">gargalos</div>
            </div>
            <div class="p-6 bg-gradient-to-br from-orange-100 to-orange-200 rounded-2xl">
              <div class="text-4xl font-black text-orange-600">${manual}</div>
              <div class="text-sm font-bold text-gray-700 mt-1">manual</div>
            </div>
            <div class="p-6 bg-gradient-to-br from-green-100 to-green-200 rounded-2xl">
              <div class="text-4xl font-black text-green-600">${auto}</div>
              <div class="text-sm font-bold text-gray-700 mt-1">automático</div>
            </div>
          </div>
        </div>
        <div class="lg:col-span-2 bg-white/80 backdrop-blur-sm p-8 rounded-3xl shadow-2xl border border-white/50">
          <h3 class="text-2xl font-black mb-6 text-gray-800">📈 Pareto 80/20</h3>
          <p class="text-lg mb-4"><strong>${pareto}min</strong> (${((pareto/total)*100).toFixed(0)}%) nos top 20% das atividades</p>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            ${atividades.slice(0,6).map((a,i)=>`
              <div class="p-4 bg-gray-50 rounded-xl border-l-4 border-blue-400">
                <div class="font-bold text-lg">${a.tempo}min</div>
                <div class="text-sm text-gray-600">${a.atividade}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function exportarPNG() {
      const svg = document.querySelector('#diagram svg');
      if (svg) {
        const svgData = new XMLSerializer().serializeToString(svg);
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width * 2;
          canvas.height = img.height * 2;
          ctx.scale(2, 2);
          ctx.drawImage(img, 0, 0);
          const link = document.createElement("a");
          link.download = `fluxo_${document.getElementById("processo").value || 'bpmn'}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgData)));
      }
    }

    function limparTudo() {
      document.querySelectorAll('input, textarea').forEach(el => el.value = '');
      document.getElementById("diagram").innerHTML = '<div class="text-center p-20 text-gray-400">Cole os dados e clique em Gerar Fluxo</div>';
      document.getElementById("analises").innerHTML = '';
    }
  </script>
</body>
</html>
